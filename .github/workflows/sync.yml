name: Daily Moodle sync

on:
  schedule:
    # Daily at 02:23 UTC (= 04:23 IST winter / 05:23 IDT summer).
    # Earlier than 04:37 to absorb GitHub Actions cron delays (1-4h is typical
    # under load) and still land before the user's morning. The :23 minute
    # avoids load spikes at the top/half of the hour.
    - cron: "23 2 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock.txt

      - name: Install dependencies
        run: pip install -r requirements.lock.txt

      - name: Decode Google credentials
        env:
          GOOGLE_CREDENTIALS_B64: ${{ secrets.GOOGLE_CREDENTIALS_B64 }}
          GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_B64 }}
        run: |
          echo "$GOOGLE_CREDENTIALS_B64" | base64 --decode > credentials.json
          echo "$GOOGLE_TOKEN_B64" | base64 --decode > token.json

      - name: Run sync
        env:
          TAU_USERNAME: ${{ secrets.TAU_USERNAME }}
          TAU_ID: ${{ secrets.TAU_ID }}
          TAU_PASSWORD: ${{ secrets.TAU_PASSWORD }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
          GOOGLE_TOKEN_PATH: token.json
          NOTIFY_GITHUB_ISSUES: ${{ vars.NOTIFY_GITHUB_ISSUES }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m src.main
